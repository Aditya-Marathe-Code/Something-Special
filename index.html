<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shalaka ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050510;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* ===== PREMIUM GLASS ===== */
.glass{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(40px) saturate(150%);
-webkit-backdrop-filter:blur(40px) saturate(150%);
border-radius:25px;
padding:35px;
width:90%;
max-width:420px;
box-shadow:
0 0 40px rgba(255,255,255,0.05),
inset 0 0 30px rgba(255,255,255,0.05);
animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}

/* ===== NEUTRAL BUTTONS ===== */
button{
margin-top:15px;
padding:12px 25px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.25);
background:linear-gradient(145deg,#2c2c34,#1a1a22);
color:#e0e0e0;
cursor:pointer;
transition:0.35s ease;
font-weight:500;
letter-spacing:0.5px;
}

button:hover{
transform:translateY(-3px);
background:linear-gradient(145deg,#3a3a45,#24242d);
box-shadow:0 8px 20px rgba(0,0,0,0.5);
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
}

.hidden{display:none;}

.options{
display:flex;
flex-direction:column;
gap:15px;
width:100%;
}

.messageBox{
margin-top:20px;
height:200px;
overflow-y:auto;
font-size:14px;
line-height:1.6;
text-align:left;
width:100%;
}

/* ===== BIRTHDAY ===== */
.birthday-text{
font-size:30px;
font-weight:700;
margin-bottom:20px;
background:linear-gradient(90deg,#ffffff,#bbbbbb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 15px rgba(255,255,255,0.3);}
to{text-shadow:0 0 30px rgba(255,255,255,0.6);}
}

.birthday-img{
display:block;
margin:0 auto;
width:220px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,255,255,0.4);
}

@media(max-width:480px){
.glass{padding:25px;}
.birthday-text{font-size:22px;}
.birthday-img{width:180px;}
}
</style>
</head>

<body>

<canvas id="universe"></canvas>
<audio id="music" src="music.mp3" loop></audio>

<div id="landing" class="glass">
<h2>Something Very Special Shalaka...</h2>
<br><h3 id="timer"></h3>
<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Enter</button>
</div>

<div id="story" class="glass hidden">
<h2>Choose a Chapter</h2>
<div class="options">
<button id="b1" onclick="showMessage(1)">Bumble</button>
<button id="b2" disabled onclick="showMessage(2)">Instagram</button>
<button id="b3" disabled onclick="showMessage(3)">Meetup</button>
</div>
<div class="messageBox" id="messageBox"></div>
</div>

<div id="birthday" class="glass hidden">
<div class="birthday-text">
Happy Birthday Shalaka! <br>
<br>From yours only Adi Marathe (Yeda)
</div>
<img src="shalaka.jpeg" class="birthday-img">
</div>

<script>

/* ===== MUSIC ===== */
document.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

/* ===== COUNTDOWN ===== */
const birthdayDate=new Date("March 29, 2026 00:00:00").getTime();
setInterval(()=>{
const now=new Date().getTime();
const diff=birthdayDate-now;
const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff/(1000*60*60))%24);
const m=Math.floor((diff/1000/60)%60);
const s=Math.floor((diff/1000)%60);
document.getElementById("timer").innerHTML=`${d}d ${h}h ${m}m ${s}s`;
},1000);

/* ===== AUTO BIRTHDAY ===== */
const today=new Date();
if(today.getMonth()===2 && today.getDate()===29){goBirthday();}

/* ===== PASSWORD ===== */
function checkPassword(){
let val=document.getElementById("password").value;
if(val==="bumble"){
landing.classList.add("hidden");
story.classList.remove("hidden");
setTimeout(()=>b2.disabled=false,15000);
setTimeout(()=>b3.disabled=false,30000);
}
else if(val==="Aditya"){goBirthday();}
else{alert("Wrong password");}
}

/* ===== STORY TEXT ===== */
function showMessage(num){
let box=document.getElementById("messageBox");
if(num===1){box.innerText="Paste Bumble message here";}
if(num===2){box.innerText="Paste Instagram message here";}
if(num===3){box.innerText="Paste Meetup message here";}
}

/* ===== BIRTHDAY MODE WITH FIREWORKS ===== */
function goBirthday(){
landing.classList.add("hidden");
story.classList.add("hidden");
birthday.classList.remove("hidden");
setInterval(createFirework,900);
}

/* ===== FIREWORKS ===== */
function createFirework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;
let particles=[];
for(let i=0;i<50;i++){
particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*3+2,
life:100
});
}
function explode(){
particles.forEach(p=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="hsl("+Math.random()*360+",100%,70%)";
ctx.fill();
});
particles=particles.filter(p=>p.life>0);
if(particles.length>0)requestAnimationFrame(explode);
}
explode();
}

/* ===== PREMIUM SLOW STARFIELD ===== */
const canvas=document.getElementById("universe");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
const STAR_COUNT=900;
const SPEED=0.12;

for(let i=0;i<STAR_COUNT;i++){
stars.push({
x:(Math.random()-0.5)*canvas.width,
y:(Math.random()-0.5)*canvas.height,
z:Math.random()*canvas.width
});
}

function animate(){
ctx.fillStyle="rgba(5,5,16,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

const centerX=canvas.width/2;
const centerY=canvas.height/2;

for(let i=0;i<stars.length;i++){
let star=stars[i];
star.z-=SPEED;

if(star.z<=0){
star.x=(Math.random()-0.5)*canvas.width;
star.y=(Math.random()-0.5)*canvas.height;
star.z=canvas.width;
}

let k=128/star.z;
let px=star.x*k+centerX;
let py=star.y*k+centerY;
let size=(1-star.z/canvas.width)*2;

ctx.beginPath();
ctx.fillStyle="white";
ctx.arc(px,py,size,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();

</script>
</body>
</html>
