<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shalaka</title>

<style>

/* ===== BACKGROUND ===== */
body{
margin:0;
padding:0;
font-family: 'Segoe UI', sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* ===== STAR CANVAS ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* ===== GLASS CARD ===== */
.container{
max-width:900px;
margin:60px auto;
padding:40px 25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter: blur(25px);
-webkit-backdrop-filter: blur(25px);
box-shadow:0 0 40px rgba(255,255,255,0.1);
text-align:center;
}

/* ===== IMAGE SECTION ===== */
.image-wrapper{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:30px;
}

.photo{
width:90%;
max-width:320px;
height:auto;
border-radius:25px;
object-fit:cover;
box-shadow:0 0 30px rgba(255,255,255,0.25);
}

/* ===== MESSAGE BOX ===== */
#messageBox{
margin-top:20px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
font-size:16px;
line-height:1.6;
min-height:120px;
}

/* ===== BUTTONS ===== */
.buttons{
margin-top:25px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

button{
padding:12px 22px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
cursor:pointer;
transition:0.3s;
backdrop-filter: blur(10px);
}

button:hover{
background:rgba(255,255,255,0.3);
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
.container{
margin:30px 15px;
padding:25px 15px;
}
.photo{
max-width:260px;
}
}

</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="image-wrapper">
<img src="shalaka.jpeg" class="photo">
</div>

<div id="messageBox">
Click a button to reveal something.
</div>

<div class="buttons">
<button onclick="showMessage(1)">Message 1</button>
<button onclick="showMessage(2)">Message 2</button>
<button onclick="showMessage(3)">Message 3</button>
<button onclick="birthdayFireworks()">Birthday 🎆</button>
</div>

</div>

<script>

/* ===== STAR BACKGROUND ===== */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*1.5,
speed:Math.random()*0.3
});
}

function animateStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
ctx.fill();

star.y += star.speed;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
});
requestAnimationFrame(animateStars);
}
animateStars();

/* ===== MESSAGES ===== */
function showMessage(num){
let box=document.getElementById("messageBox");

if(num===1){
box.innerText=`Hey Bumble match,

It was just another normal evening. Phone in hand. Mind somewhere between tired and relaxed. Scrolling without thinking too much. Profiles came and went.

Then yours showed up.

You’re beautiful — that’s obvious. But what made me stop wasn’t just that. It was how you carried yourself. Simple pictures. No unnecessary noise. Confident, but calm. Effortless. Real.

I don’t usually pause for long.

But I did.

We matched.

The conversation started normally — basic introductions, a little teasing, small jokes. Nothing dramatic. But somehow it didn’t feel forced. It flowed. One conversation turned into many. Late replies became instant ones. Random updates about the day started feeling important. We laughed more than expected.

Getting your Instagram took some effort. I won’t lie.

But I don’t put effort where I don’t see value.

And then…

We both disappeared.

No fight. No explanation. Just silence.

Time passed. Work. Routine. Life. Everything moved the way it does. I didn’t chase it. I didn’t question it.

Then somehow, we reconnected.

Same energy. Same comfort. Like the pause was just a comma, not a full stop.

This time the conversations were different. A little deeper. Less pretending. More real.

Eventually, we decided to meet.

I wasn’t nervous. Just curious.

Curious if the vibe would survive outside the screen.

When I saw you walking toward me, smiling the same way…

It felt steady. Certain.

This wasn’t just another match.

It was becoming something more.

And that’s when everything shifted —
not on Bumble…

but somewhere else.`;
}

if(num===2){
box.innerText=`And that “somewhere else” became Instagram.

Story replies turned into long chats. Cute voice notes. Flirty replies. Random crazy reels at 1 AM that only we found funny. It was light — but it was real.

Some conversations were stupid. Some went unexpectedly deep.

You started sending updates without being asked. I started waiting for them without admitting it.

Your voice notes felt different. Comfortable. Familiar.

Somewhere between a late-night reel and a “reach home safe” text, the energy changed.

We weren’t just two people talking anymore.

We were choosing to talk.

And that’s a difference.

The teasing became softer. The silences became easier. The flirting became less about impressing and more about understanding.

And somewhere between a voice note and a shared reel…

we both knew —

this needed to move beyond the screen.

So we planned it.

A simple meet.

Nothing dramatic.

But we both knew it wasn’t just “simple.”

And when that day came…

I realized something.

The screen had been hiding a lot.`;
}

if(num===3){
box.innerText=`And then we finally met.

First thing — your pictures don’t do you justice. Not even close. You’re way prettier in real life. I’m not saying that to impress you. It genuinely caught me off guard for a second.

We’ve spoken on calls for hours before. Deep conversations where you just listened patiently.

I’m not the calmest person — you know that. Short-tempered. Sometimes I use foul language while telling a story.

But the way you’d softly cut me off and make me rephrase it?

No one’s ever done that.

And the funny part?

I actually listened.

I still laugh thinking about your reaction when you remembered we weren’t just “random followers.” We met on Bumble. The way your expression changed — priceless.

The bike ride felt different that night.

Your nonstop talking. The way you explain things with so much detail. It was peaceful and exciting at the same time.

I didn’t even think of it as a date.

I genuinely wanted to know your story.

And after hearing parts of it, I just thought…

Damn.

She’s actually a really good person.

Your photo gallery is a roller coaster — cute pictures, random aesthetics, and those socks. I was convinced you’re a little crazy.

In the best way.

And when you casually said you want four kids?

I was shocked.

But somehow, I could picture you being the best mom.

I honestly didn’t want that night to end.

And yeah…

I missed something.

Not just a kiss — though yes, that too.

I wanted to look into your eyes properly. The way they shine in photos… I forgot to pause and really see them up close.

I was too busy listening to you.

And this time…

I don’t want to miss anything.

I don’t want to rush this. I don’t want to put pressure on you.

But I’d genuinely like to take you out properly.

Maybe we start dating. Slowly.

No forcing. No expectations.

Just two people who found each other twice…

and don’t want to lose that chance a third time.`;
}
}

/* ===== FIREWORKS EFFECT ===== */
function birthdayFireworks(){
for(let i=0;i<20;i++){
let fire=document.createElement("div");
fire.style.position="fixed";
fire.style.width="6px";
fire.style.height="6px";
fire.style.borderRadius="50%";
fire.style.background="white";
fire.style.top=Math.random()*100+"vh";
fire.style.left=Math.random()*100+"vw";
fire.style.boxShadow="0 0 20px white";
fire.style.animation="explode 1s ease-out forwards";
document.body.appendChild(fire);

setTimeout(()=>{fire.remove();},1000);
}
}

</script>

<style>
@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(6);opacity:0;}
}
</style>

</body>
</html>
